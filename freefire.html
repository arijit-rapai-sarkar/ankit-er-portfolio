<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Free Fire Max | Ankit Sarkar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="mini-page">
    <main class="ffm-main">
      <section class="ffm-fullscreen ffm-professional reveal show">
        <img
          src="image/free fire.jpeg"
          alt="Free Fire Max profile image"
          class="ffm-background"
        />
        <div class="ffm-overlay" aria-hidden="true"></div>

        <div class="ffm-content">
          <div class="ffm-heading">
            <p class="eyebrow">Gaming Profile</p>
            <h1 class="title mini-title">Free Fire Max</h1>
          </div>

          <article class="ffm-profile-showcase">
            <img
              src="image/free fire.jpeg"
              alt="Full Free Fire Max profile"
              class="ffm-profile-image"
            />
          </article>

          <div class="ffm-panel">
            <article class="ffm-detail-card">
              <h2>Profile Details</h2>
              <div class="ffm-detail-grid">
                <p class="ffm-label">UID</p>
                <p class="ffm-value">1765768149</p>
                <p class="ffm-label">Level</p>
                <p class="ffm-value">71</p>
              </div>

              <div class="ffm-tag-row">
                <span class="ffm-tag">Free Styler</span>
                <span class="ffm-tag">Br Rank Pusher</span>
              </div>
            </article>

            <article class="ffm-scan-card">
              <img src="image/free fire scan .jpeg" alt="Free Fire Max scanner" class="ffm-scan-image" />
              <p class="ffm-scan-text">Scan to play with me</p>
            </article>
          </div>

          <a class="btn btn-ghost ffm-back" href="gaming.html">Back to Gaming</a>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
